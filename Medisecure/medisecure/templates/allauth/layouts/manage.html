{% load static i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediSecure</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-wrapper { width: 100%; max-width: 440px; padding: 20px; }
    .auth-brand { text-align: center; margin-bottom: 32px; }
    .auth-brand h1 { font-size: 24px; font-weight: 700; color: #f0f0f0; }
    .auth-brand p { font-size: 13px; color: #888; margin-top: 4px; }
    .auth-card { background: #111111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 32px; }
    .auth-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #f0f0f0; }
    .auth-links { margin-top: 20px; text-align: center; font-size: 13px; color: #666; border-top: 1px solid #1f1f1f; padding-top: 16px; }
    .auth-links a { color: #3b82f6; text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
    input[type=email], input[type=text], input[type=password] {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0f0f0;
      padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    .btn-primary, button[type=submit] {
      width: 100%; background: #3b82f6; color: #fff; border: none;
      padding: 11px; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .btn-primary:hover, button[type=submit]:hover { background: #2563eb; }
    p { font-size: 13px; color: #888; margin-bottom: 14px; }
    a { color: #3b82f6; }
    .helptext, .form-text { font-size: 11px; color: #555; }
    ul.errorlist { list-style: none; padding: 0; }
    ul.errorlist li { color: #ef4444; font-size: 12px; margin-bottom: 4px; }
    .alert, .alert-error, .alert-danger {
      padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444;
    }
    .alert-success {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e;
    }
    .alert-info {
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #3b82f6;
    }
    /* allauth card wrapper */
    .card { background: transparent; border: none; }
    .card-body { padding: 0; }
    .form-control {
      width: 100%; background: #1a1a1a !important; border: 1px solid #2a2a2a !important;
      color: #f0f0f0 !important; padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px;
    }
    .form-control:focus { border-color: #3b82f6 !important; box-shadow: none !important; }
    .mb-3 { margin-bottom: 14px !important; }
    .col-sm-10 { padding: 0; width: 100%; max-width: 100%; }
    .row { margin: 0; }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-brand">
    <h1><i class="bi bi-shield-plus" style="color:#3b82f6"></i> MediSecure</h1>
    <p>Plateforme sécurisée de gestion médicale</p>
  </div>
  <div class="auth-card">
    {% block content %}{% endblock %}
  </div>
  <div class="auth-links">
    <a href="{% url 'account_login' %}"><i class="bi bi-arrow-left"></i> Retour à la connexion</a>
  </div>
</div>
</body>
</html>
