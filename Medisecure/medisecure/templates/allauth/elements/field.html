{% load allauth %}

{% if attrs.type == "hidden" %}
  <input type="hidden"
         {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
         {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
         value="{{ attrs.value|default_if_none:"" }}"/>
{% elif attrs.type == "checkbox" %}
  <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px">
    <input {% if attrs.required %}required{% endif %}
           {% if attrs.disabled %}disabled{% endif %}
           {% if attrs.checked %}checked{% endif %}
           {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
           {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
           type="checkbox"
           style="accent-color:#3b82f6; width:15px; height:15px; cursor:pointer;"/>
    <label for="{{ attrs.id }}" style="font-size:13px; color:#aaa; cursor:pointer; margin:0">
      {% slot label %}{% endslot %}
    </label>
  </div>
{% elif attrs.type == "radio" %}
  <div style="margin-bottom:10px; display:flex; align-items:center; gap:8px">
    <input {% if attrs.required %}required{% endif %}
           {% if attrs.disabled %}disabled{% endif %}
           {% if attrs.checked %}checked{% endif %}
           {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
           {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
           value="{{ attrs.value|default_if_none:"" }}"
           type="radio"
           style="accent-color:#3b82f6; width:15px; height:15px; cursor:pointer;"/>
    <label for="{{ attrs.id }}" style="font-size:13px; color:#aaa; cursor:pointer; margin:0">
      {% slot label %}{% endslot %}
    </label>
  </div>
{% else %}
  <div style="margin-bottom:16px">
    <label for="{{ attrs.id }}" style="display:block; font-size:12px; color:#888; margin-bottom:6px; font-weight:500;">
      {% slot label %}{% endslot %}
    </label>
    <input {% if attrs.required %}required{% endif %}
           {% if attrs.disabled %}disabled{% endif %}
           {% if attrs.readonly %}readonly{% endif %}
           {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
           {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
           {% if attrs.placeholder %}placeholder="{{ attrs.placeholder }}"{% endif %}
           {% if attrs.autocomplete %}autocomplete="{{ attrs.autocomplete }}"{% endif %}
           value="{{ attrs.value|default_if_none:"" }}"
           type="{{ attrs.type }}"
           style="width:100%; background:#1a1a1a; border:1px solid #2a2a2a; color:#f0f0f0; padding:10px 12px; border-radius:6px; font-size:14px;"
           onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#2a2a2a'"/>
    {% if slots.help_text %}
      <div style="font-size:11px; color:#555; margin-top:4px">{% slot help_text %}{% endslot %}</div>
    {% endif %}
  </div>
{% endif %}

{% if slots.errors %}
  <div style="margin-top:-10px; margin-bottom:10px; font-size:12px; color:#ef4444">
    {% slot errors %}{% endslot %}
  </div>
{% endif %}
