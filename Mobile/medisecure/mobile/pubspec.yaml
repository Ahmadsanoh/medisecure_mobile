name: medisecure
description: MediSecure — Secure medical app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # HTTP & API
  dio: ^5.4.3
  connectivity_plus: ^6.0.0
  flutter_dotenv: ^5.1.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Routing
  go_router: ^13.2.0
  # Local storage / secure storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  # Notifications
  flutter_local_notifications: ^17.1.2
  # QR code
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  path_provider: ^2.1.3
  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.4.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
